# Deploy monte_carlo_service to Google Cloud Run on push to main.
#
# Prerequisites (GCP):
#   1. Enable APIs: Cloud Run, Cloud Build, Artifact Registry, IAM Credentials
#   2. Create Artifact Registry docker repo (e.g. optimus)
#   3. Create a service account for GitHub with roles:
#        - roles/run.admin
#        - roles/iam.serviceAccountUser  (on Cloud Run runtime SA if different)
#        - roles/artifactregistry.writer
#        - roles/cloudbuild.builds.editor   (or builds.builder + logs)
#   4. Workload Identity Federation: connect GitHub → allow this repo to impersonate that SA
#      https://github.com/google-github-actions/auth/blob/main/README.md
#
# GitHub repository secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER  e.g. projects/123/locations/global/workloadIdentityPools/pool/providers/gh
#   GCP_SERVICE_ACCOUNT             full email: github-deploy@PROJECT.iam.gserviceaccount.com
#
# GitHub repository variables (Settings → Secrets and variables → Actions → Variables):
#   GCP_PROJECT_ID                  default in workflow: stockshares-dev
#   GCP_REGION                      default in workflow: europe-west3
#   GCP_ARTIFACT_REPOSITORY         default: cloud-run-source-deploy (Docker repo in same region)
#   CLOUD_RUN_SERVICE               default: optimus-monte-carlo

name: Deploy Monte Carlo API to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "monte_carlo_service/**"
      - "cloudbuild.yaml"
      - ".github/workflows/deploy-monte-carlo-cloud-run.yml"
  workflow_dispatch:

concurrency:
  group: cloud-run-monte-carlo-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'optimus-monte-carlo' }}
  REGION: ${{ vars.GCP_REGION || 'europe-west3' }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'stockshares-dev' }}
  AR_REPO: ${{ vars.GCP_ARTIFACT_REPOSITORY || 'cloud-run-source-deploy' }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate configuration
        run: |
          echo "Using PROJECT_ID=${PROJECT_ID} REGION=${REGION} SERVICE=${SERVICE} AR_REPO=${AR_REPO}"

      - name: Build and push image (Cloud Build)
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${SERVICE}:${SHORT_SHA}"
          echo "Building ${IMAGE}"
          # Root cloudbuild.yaml: Dockerfile path monte_carlo_service/Dockerfile (fixes /workspace/Dockerfile missing)
          gcloud builds submit . \
            --config cloudbuild.yaml \
            --substitutions=_REGION="${REGION}",_AR_REPOSITORY="${AR_REPO}",_IMAGE_NAME="${SERVICE}",_TAG="${SHORT_SHA}" \
            --project "${PROJECT_ID}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --project "${PROJECT_ID}" \
            --quiet

      - name: Show deployed URL and revision (verify in browser)
        run: |
          set -euo pipefail
          echo "=== Open THIS URL (must match service ${SERVICE} in ${REGION}) ==="
          URL="$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format 'value(status.url)')"
          echo "${URL}"
          echo ""
          echo "=== Latest ready revision and container image ==="
          echo -n "revision: "
          gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format 'value(status.latestReadyRevisionName)'
          echo -n "image: "
          gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format 'value(spec.template.spec.containers[0].image)'
          echo ""
          echo "=== Traffic split (100% should be on the new revision) ==="
          gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format 'yaml(status.traffic)'
